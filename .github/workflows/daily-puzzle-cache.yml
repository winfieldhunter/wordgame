# Daily puzzle cache: precompute today's percentile cache and either upload to R2/S3 or commit+push.
# Runs at 00:05 Eastern (05:05 UTC) so the new day's puzzle is ready after midnight Eastern.
# Set OPENAI_API_KEY. For R2: set variable UPLOAD_TO_R2=true and secrets AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ENDPOINT_URL; vars S3_BUCKET, S3_PREFIX, AWS_REGION.
name: Daily puzzle cache

on:
  schedule:
    # 00:05 Eastern (05:05 UTC) every day — after midnight in America/New_York
    - cron: "5 5 * * *"
  workflow_dispatch:

env:
  TZ: America/New_York
  # One-time shift: set in repo Variables (e.g. PUZZLE_DATE_OFFSET_DAYS=1, PUZZLE_OFFSET_APPLY_UNTIL=2026-02-24) so today shows tomorrow's puzzle; remove or clear after that date.
  PUZZLE_DATE_OFFSET_DAYS: ${{ vars.PUZZLE_DATE_OFFSET_DAYS || '0' }}
  PUZZLE_OFFSET_APPLY_UNTIL: ${{ vars.PUZZLE_OFFSET_APPLY_UNTIL || '' }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch vocabulary
        run: npm run fetch-vocabulary
        continue-on-error: true

      - name: Restore embeddings cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: embeddings-${{ hashFiles('data/vocabulary.txt') }}
          restore-keys: embeddings-

      - name: Precompute today's puzzle cache
        run: npm run precompute:export -- --today
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: List generated cache artifact
        run: |
          echo "=== data/puzzle-cache/ contents ==="
          ls -lh data/puzzle-cache/ || true
          TODAY_ID=$(npx tsx scripts/today-puzzle-id.ts)
          echo "=== Expected filename for today (matches getTodayPuzzleId) ==="
          echo "$TODAY_ID.json"
          if [ -f "data/puzzle-cache/$TODAY_ID.json" ]; then
            echo "OK: $TODAY_ID.json present"
          else
            echo "MISSING: data/puzzle-cache/$TODAY_ID.json"
          fi

      # R2: set repo variable UPLOAD_TO_R2=true and secrets AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ENDPOINT_URL.
      # We set credentials as env vars (no configure-aws-credentials) so we never call AWS STS; R2 keys are S3-compatible only.
      - name: Upload to Cloudflare R2 (S3 API)
        if: ${{ vars.UPLOAD_TO_R2 == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          S3_BUCKET: ${{ vars.S3_BUCKET || 'nearword-cache' }}
          S3_PREFIX: ${{ vars.S3_PREFIX || 'puzzle-cache' }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
        run: |
          TODAY_ID=$(npx tsx scripts/today-puzzle-id.ts)
          S3_DEST="s3://$S3_BUCKET/$S3_PREFIX/$TODAY_ID.json"
          echo "=== Upload destination (must match PUZZLE_CACHE_BASE_URL + /$TODAY_ID.json) ==="
          echo "$S3_DEST"
          if [ -z "$AWS_ENDPOINT_URL" ]; then
            echo "AWS_ENDPOINT_URL not set (required for R2). Use R2 S3 API endpoint, e.g. https://<ACCOUNT_ID>.r2.cloudflarestorage.com"
            exit 1
          fi
          if [ -f "data/puzzle-cache/$TODAY_ID.json" ]; then
            aws s3 cp "data/puzzle-cache/$TODAY_ID.json" "$S3_DEST" --endpoint-url "$AWS_ENDPOINT_URL"
            echo "=== Verify: list after upload (best-effort; R2 may return NoSuchKey for list) ==="
            aws s3 ls "s3://$S3_BUCKET/$S3_PREFIX/" --endpoint-url "$AWS_ENDPOINT_URL" | grep -E "$TODAY_ID" || aws s3 ls "s3://$S3_BUCKET/$S3_PREFIX/" --endpoint-url "$AWS_ENDPOINT_URL" || true
            echo "Uploaded $TODAY_ID.json to R2. App fetches: \${PUZZLE_CACHE_BASE_URL}/$TODAY_ID.json"
          else
            echo "No file data/puzzle-cache/$TODAY_ID.json"
            exit 1
          fi

      - name: Commit and push cache (when R2 not configured)
        if: ${{ vars.UPLOAD_TO_R2 != 'true' }}
        run: |
          TODAY_ID=$(npx tsx scripts/today-puzzle-id.ts)
          echo "=== Branch (Vercel should deploy this branch) ==="
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_HEAD_REF=$GITHUB_HEAD_REF"
          if [ ! -f "data/puzzle-cache/$TODAY_ID.json" ]; then
            echo "No file data/puzzle-cache/$TODAY_ID.json"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "data/puzzle-cache/$TODAY_ID.json"
          echo "=== git status before commit ==="
          git status
          if git diff --staged --quiet; then
            echo "No changes to commit (file already committed)"
          else
            git commit -m "chore: daily puzzle cache $TODAY_ID [skip ci]"
            echo "=== Commit SHA ==="
            git rev-parse HEAD
            git push origin HEAD
            echo "Pushed commit to origin"
          fi
