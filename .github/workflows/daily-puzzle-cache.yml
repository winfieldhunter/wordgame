# Daily puzzle cache: precompute today's and tomorrow's percentile caches (easy, medium, hard each) and upload to R2 or commit+push.
# Runs at 00:05 Eastern (05:05 UTC). Set OPENAI_API_KEY. For R2: UPLOAD_TO_R2=true and secrets AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ENDPOINT_URL.
name: Daily puzzle cache

on:
  schedule:
    - cron: "5 5 * * *"
  workflow_dispatch:

env:
  TZ: America/New_York
  PUZZLE_DATE_OFFSET_DAYS: ${{ vars.PUZZLE_DATE_OFFSET_DAYS || '0' }}
  PUZZLE_OFFSET_APPLY_UNTIL: ${{ vars.PUZZLE_OFFSET_APPLY_UNTIL || '' }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch vocabulary
        run: npm run fetch-vocabulary
        continue-on-error: true

      - name: Restore embeddings cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: embeddings-${{ hashFiles('data/vocabulary.txt') }}
          restore-keys: embeddings-

      - name: Precompute today's puzzle cache (easy, medium, hard)
        run: npm run precompute:export -- --today
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Precompute tomorrow's puzzle cache
        run: |
          TODAY_EASY=$(npx tsx scripts/today-puzzle-id.ts | head -1)
          TODAY_DATE="${TODAY_EASY#daily-}"
          TODAY_DATE="${TODAY_DATE%-easy}"
          TOMORROW_DATE=$(date -d "$TODAY_DATE + 1 day" +%Y-%m-%d)
          echo "Building tomorrow's cache: $TOMORROW_DATE (easy, medium, hard)"
          npx tsx scripts/precompute.ts --from "$TOMORROW_DATE" --to "$TOMORROW_DATE" --output-dir data/puzzle-cache
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: List generated cache artifacts
        run: |
          echo "=== data/puzzle-cache/ contents ==="
          ls -lh data/puzzle-cache/ || true
          TODAY_EASY=$(npx tsx scripts/today-puzzle-id.ts | head -1)
          TODAY_DATE="${TODAY_EASY#daily-}"
          TODAY_DATE="${TODAY_DATE%-easy}"
          TOMORROW_DATE=$(date -d "$TODAY_DATE + 1 day" +%Y-%m-%d)
          for level in easy medium hard; do
            for d in "$TODAY_DATE" "$TOMORROW_DATE"; do
              f="data/puzzle-cache/daily-${d}-${level}.json"
              [ -f "$f" ] && echo "OK: $f" || echo "MISSING: $f"
            done
          done

      - name: Upload to Cloudflare R2 (S3 API)
        if: ${{ vars.UPLOAD_TO_R2 == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          S3_BUCKET: ${{ vars.S3_BUCKET || 'nearword-cache' }}
          S3_PREFIX: ${{ vars.S3_PREFIX || 'puzzle-cache' }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
        run: |
          if [ -z "$AWS_ENDPOINT_URL" ]; then
            echo "AWS_ENDPOINT_URL not set (required for R2)."
            exit 1
          fi
          for f in data/puzzle-cache/daily-*.json; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            aws s3 cp "$f" "s3://$S3_BUCKET/$S3_PREFIX/$name" --endpoint-url "$AWS_ENDPOINT_URL"
            echo "Uploaded $name to R2"
          done
          echo "App fetches: \${PUZZLE_CACHE_BASE_URL}/<puzzleId>.json"

      - name: Commit and push cache (when R2 not configured)
        if: ${{ vars.UPLOAD_TO_R2 != 'true' }}
        run: |
          TODAY_EASY=$(npx tsx scripts/today-puzzle-id.ts | head -1)
          TODAY_DATE="${TODAY_EASY#daily-}"
          TODAY_DATE="${TODAY_DATE%-easy}"
          TOMORROW_DATE=$(date -d "$TODAY_DATE + 1 day" +%Y-%m-%d)
          if [ ! -f "data/puzzle-cache/daily-${TODAY_DATE}-easy.json" ]; then
            echo "No today cache files found."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/puzzle-cache/daily-*.json
          echo "=== git status before commit ==="
          git status
          if git diff --staged --quiet; then
            echo "No changes to commit (files already committed)"
          else
            git commit -m "chore: daily puzzle cache $TODAY_DATE + $TOMORROW_DATE (easy, medium, hard) [skip ci]"
            git push origin HEAD
            echo "Pushed commit to origin"
          fi
